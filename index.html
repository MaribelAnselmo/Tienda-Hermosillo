<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Tech HMO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;background:#f4f6f9}

header{
  background:linear-gradient(135deg,#0a2540,#163d6b);
  color:#fff;
  padding:20px;
  text-align:center;
}

h1{margin:0;font-weight:600}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:0.3s;
  position:relative;
}

.card:hover{
  transform:translateY(-5px);
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#00a86b;
  color:#fff;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.thumbs{
  display:flex;
  gap:5px;
  margin-top:8px;
}

.thumbs img{
  width:50px;
  height:50px;
  object-fit:cover;
  border-radius:5px;
  cursor:pointer;
  border:2px solid transparent;
}

.thumbs img:hover{
  border:2px solid #0a2540;
}

.title{font-size:16px;margin:10px 0}
.price{color:#00a86b;font-weight:600;font-size:18px}

select,input{
  width:100%;
  padding:8px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#25D366;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:8px;
  margin-top:10px;
  font-weight:600;
  cursor:pointer;
}

button:hover{background:#1ebe5d}

/* CARRITO */
.carrito{
  position:fixed;
  top:20px;
  right:20px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  width:260px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  z-index:1000;
}

.carrito h3{margin:0 0 10px}
.carrito-item{font-size:12px;margin-bottom:5px}

.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>Tienda Online   Hermosillo, Sonora</h1>
<p>Compra fácil por WhatsApp 💬</p>
</header>

<section class="container" id="productos"></section>

<!-- CARRITO -->
<div class="carrito" id="carrito">
<h3>🛒 Carrito</h3>
<div id="lista"></div>
<p><b>Total: $<span id="total">0</span></b></p>
<button onclick="enviarCarrito()">Enviar por WhatsApp</button>
</div>

<div class="whatsapp-float" onclick="contactoGeneral()">💬</div>

<script>
const productos=[
{id:1,nombre:'Audífonos Bluetooth',precio:350,imagenes:['img/Audifonos1.png','img/Audifonos1.1.png.png','img/Audifonos1.2.png'],colores:['Negro','Blanco'],tag:'Top'},
{id:2,nombre:'Audífonos Bluetooth 5.3',precio:320,imagenes:['img/Audifonos2.png','img/Audifonos2.1.png'],colores:['Negro'],tag:'Calidad'},
{id:3,nombre:'Soporte Ventosa Magético',precio:150,imagenes:['img/Soporte1.png','img/Soporte1.1.png'],colores:['Negro']},
{id:4,nombre:'Powerbank 40000mAh',precio:380, imagenes:['img/Cargador45.1.png'], colores:['Negro'], tag: 'Máxima Duración'},
{id:5,nombre:'Smartwatch',precio:750, imagenes:['img/Reloj1.png', 'img/Reloj1.1.png', 'img/Reloj1.2.png'], colores:['Clásico'],tag:'Moda'},
];

const cont=document.getElementById('productos');
let carrito=[];

productos.forEach(p=>{
  cont.innerHTML+=`
  <div class="card">
    ${p.tag?`<div class="badge">${p.tag}</div>`:''}
     <img id="main-${p.id}" src="${p.imagenes ? p.imagenes[0] : ''}">

     <div class="thumbs">
       ${p.imagenes ? p.imagenes.map(img => 
         `<img src="${img}" onclick="cambiarImg(${p.id}, '${img}')">`
       ).join('') : ''}
     </div>

    <div class="title">${p.nombre}</div>
    <div class="price">$${p.precio} MXN</div>

    <select id="color-${p.id}">
      ${p.colores.map(c=>`<option>${c}</option>`).join('')}
    </select>

    <input type="number" id="qty-${p.id}" value="1" min="1">

    <select id="envio-${p.id}">
      <option value="Sin envío">Recoger en punto</option>
      <option value="Con envío">Servicio a domicilio</option>
    </select>

    <input type="text" id="direccion-${p.id}" placeholder="Dirección de entrega (si aplica)">

    <button onclick="agregarCarrito(${p.id})">Agregar al carrito</button>
    <button onclick="comprar(${p.id})">Comprar por WhatsApp</button>
  </div>`;
});

function cambiarImg(id, img){
  document.getElementById(`main-${id}`).src = img;
}

function agregarCarrito(id){
  const p=productos.find(x=>x.id===id);
  const qty=parseInt(document.getElementById(`qty-${id}`).value);

  carrito.push({nombre:p.nombre,precio:p.precio,cantidad:qty});
  renderCarrito();
}

function renderCarrito(){
  const lista=document.getElementById('lista');
  lista.innerHTML='';
  let total=0;

  carrito.forEach((item,i)=>{
    total+=item.precio*item.cantidad;
    lista.innerHTML+=`<div class="carrito-item">
      ${item.nombre} x${item.cantidad} - $${item.precio*item.cantidad}
      <button onclick="eliminarItem(${i})">❌</button>
    </div>`;
  });

  document.getElementById('total').innerText=total;
}

function eliminarItem(i){
  carrito.splice(i,1);
  renderCarrito();
}

function enviarCarrito(){
  let msg='Hola, quiero comprar:%0A';
  let total=0;

  carrito.forEach(item=>{
    msg+=`${item.nombre} x${item.cantidad} - $${item.precio*item.cantidad}%0A`;
    total+=item.precio*item.cantidad;
  });

  msg+=`Total: $${total} MXN`;

  window.open(`https://wa.me/526625302790?text=${msg}`);
}

function comprar(id){
  const p=productos.find(x=>x.id===id);
  const color=document.getElementById(`color-${id}`).value;
  const qty=document.getElementById(`qty-${id}`).value;
  const envio=document.getElementById(`envio-${id}`).value;
  const direccion=document.getElementById(`direccion-${id}`).value;
  const total=p.precio*qty;

  const msg=`Hola, quiero comprar:%0AProducto: ${p.nombre}%0AColor: ${color}%0ACantidad: ${qty}%0AEnvío: ${envio}%0ADirección: ${direccion}%0ATotal: $${total} MXN`;

  window.open(`https://wa.me/526625302790?text=${msg}`);
}

function contactoGeneral(){
  window.open('https://wa.me/526625302790?text=Hola, quiero información');
}
</script>

</body>
</html>
